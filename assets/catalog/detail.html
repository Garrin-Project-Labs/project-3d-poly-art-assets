<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Poly Art Assets — Asset Detail</title>
  <style>
    :root { color-scheme: dark; --bg:#101827; --panel:#172235; --text:#e5edf7; --muted:#a9b7cc; --gold:#f8cf5a; --blue:#9cc9ff; --green:#8ff0b0; --red:#ff9b9b; }
    * { box-sizing:border-box; }
    html, body { margin:0; min-height:100%; background:radial-gradient(circle at top left,#263f68,var(--bg) 48%); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,sans-serif; }
    body { padding:28px; }
    a { color:var(--blue); }
    main { max-width:1120px; margin:0 auto; }
    .back { display:inline-flex; margin-bottom:18px; }
    .hero { display:grid; grid-template-columns:minmax(280px, 1fr) minmax(300px, .8fr); gap:20px; align-items:stretch; }
    .panel { border:1px solid rgba(255,255,255,.11); border-radius:26px; background:rgba(23,34,53,.86); box-shadow:0 22px 70px rgba(0,0,0,.28); overflow:hidden; }
    .copy { padding:22px; }
    .viewport { min-height:420px; background:linear-gradient(#18243a,#101827); position:relative; }
    .viewport canvas { position:absolute; inset:0; width:100%; height:100%; }
    .eyebrow { color:var(--gold); font-size:12px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; }
    h1 { margin:8px 0 10px; font-size:clamp(34px,6vw,64px); letter-spacing:-.05em; line-height:.95; }
    p, .muted { color:var(--muted); line-height:1.5; }
    .badge { display:inline-flex; align-items:center; gap:6px; margin:6px 8px 6px 0; padding:6px 10px; border-radius:999px; background:rgba(156,201,255,.12); color:#d9ecff; font-size:12px; font-weight:850; }
    .badge.prototype { background:rgba(248,207,90,.13); color:#ffe8a1; }
    .badge.game-ready { background:rgba(143,240,176,.14); color:#caffe0; }
    .badge.hero { background:rgba(255,155,155,.16); color:#ffd1d1; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin:18px 0; }
    button, select, .button { border:1px solid rgba(255,255,255,.13); border-radius:999px; padding:9px 12px; background:rgba(255,255,255,.07); color:var(--text); text-decoration:none; font-weight:850; cursor:pointer; }
    button.primary { background:var(--gold); color:#101827; }
    pre { overflow:auto; padding:14px; border-radius:16px; background:rgba(0,0,0,.30); color:#dfffea; font-size:13px; line-height:1.45; }
    dl { display:grid; grid-template-columns:140px 1fr; gap:9px 14px; margin:0; }
    dt { color:var(--muted); font-size:13px; }
    dd { margin:0; font-weight:750; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; margin-top:18px; }
    .empty { padding:28px; }
    @media (max-width: 820px) { .hero { grid-template-columns:1fr; } .viewport { min-height:320px; } dl { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main id="app">
    <a class="back" href="./">← Back to catalog</a>
    <section id="missing" class="panel empty" hidden>
      <div class="eyebrow">Asset not found</div>
      <h1>Unknown asset</h1>
      <p>Pick an asset from the catalog first.</p>
    </section>
    <section id="detail" hidden>
      <div class="hero">
        <div class="panel viewport" id="viewport"></div>
        <article class="panel copy">
          <div class="eyebrow" id="kind"></div>
          <h1 id="name"></h1>
          <div id="badges"></div>
          <p id="summary"></p>
          <label>Animation <select id="animationSelect"></select></label>
          <div class="actions">
            <button class="primary" id="copyImport" type="button">Copy import</button>
            <button id="copyId" type="button">Copy id</button>
            <a class="button" id="snippetLink" download>Advanced: snippet file</a>
          </div>
          <pre><code id="importSnippet"></code></pre>
        </article>
      </div>
      <div class="grid">
        <section class="panel copy">
          <div class="eyebrow">Import readiness</div>
          <dl id="quality"></dl>
        </section>
        <section class="panel copy">
          <div class="eyebrow">Gameplay placement</div>
          <dl id="gameplay"></dl>
        </section>
        <section class="panel copy">
          <div class="eyebrow">Attachment points</div>
          <dl id="attachments"></dl>
        </section>
      </div>
    </section>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "poly-art-assets": "../poly-art-assets.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { ASSET_CATALOG, createAssetById, animateAsset, getAssetGameplayMeta, getAssetAttachmentPoints, getAssetQualityMeta } from 'poly-art-assets';

    const params = new URLSearchParams(location.search);
    const assetId = params.get('id') || ASSET_CATALOG[0]?.id;
    const item = ASSET_CATALOG.find(candidate => candidate.id === assetId);
    const detail = document.getElementById('detail');
    const missing = document.getElementById('missing');

    if (!item) {
      missing.hidden = false;
    } else {
      detail.hidden = false;
      document.title = `${item.name} — 3D Poly Art Assets`;
      renderDetail(item);
      mountPreview(item);
    }

    function renderDetail(item) {
      const quality = getAssetQualityMeta(item.id);
      const gameplay = getAssetGameplayMeta(item.id);
      const attachments = getAssetAttachmentPoints(item.id);
      const importSnippet = assetImportSnippet(item.id);

      document.getElementById('kind').textContent = `${item.type} · ${item.role}`;
      document.getElementById('name').textContent = item.name;
      document.getElementById('summary').textContent = `Use ${item.id} as a ${item.type} asset with ${item.animations.join(', ')} animation support.`;
      document.getElementById('badges').innerHTML = [`<span class="badge ${quality.tier}">${quality.tier}</span>`, ...item.tags.map(tag => `<span class="badge">${tag}</span>`)].join('');
      document.getElementById('snippetLink').href = `../snippets/${item.id}.js`;
      document.getElementById('importSnippet').textContent = importSnippet;

      const animationSelect = document.getElementById('animationSelect');
      animationSelect.innerHTML = item.animations.map(animation => `<option>${animation}</option>`).join('');
      window.selectedAnimation = item.animations[0] || 'idle';
      animationSelect.onchange = () => window.selectedAnimation = animationSelect.value;

      document.getElementById('copyImport').onclick = event => copyText(importSnippet, event.currentTarget, 'Copied import');
      document.getElementById('copyId').onclick = event => copyText(item.id, event.currentTarget, 'Copied id');

      fillDefinitionList(document.getElementById('quality'), {
        tier: quality.tier,
        forward: quality.forwardAxis,
        origin: quality.origin,
        meshes: quality.meshCount,
        triangles: quality.triangleCount,
        materials: quality.materialCount,
        'named parts': quality.namedPartCount
      });
      fillDefinitionList(document.getElementById('gameplay'), {
        width: gameplay.size.x.toFixed(2),
        height: gameplay.height.toFixed(2),
        depth: gameplay.size.z.toFixed(2),
        radius: gameplay.radius.toFixed(2),
        'ground offset': gameplay.groundOffset.toFixed(2),
        center: formatVector(gameplay.center)
      });
      fillDefinitionList(document.getElementById('attachments'), Object.fromEntries(
        Object.entries(attachments).map(([key, vector]) => [key, formatVector(vector)])
      ));
    }

    function fillDefinitionList(dl, values) {
      dl.innerHTML = Object.entries(values).map(([key, value]) => `<dt>${key}</dt><dd>${value}</dd>`).join('');
    }

    function formatVector(vector) {
      return `${vector.x.toFixed(2)}, ${vector.y.toFixed(2)}, ${vector.z.toFixed(2)}`;
    }

    function assetImportSnippet(id) {
      return `import { createAssetById, animateAsset } from 'poly-art-assets';\n\nconst asset = createAssetById('${id}');\nscene.add(asset);\n\n// In your render loop:\nanimateAsset(asset, 'idle', clock.elapsedTime, clock.getDelta());`;
    }

    async function copyText(text, button, copiedLabel) {
      const original = button.textContent;
      try {
        await navigator.clipboard.writeText(text);
        button.textContent = copiedLabel;
      } catch {
        button.textContent = 'Copy unavailable';
      }
      setTimeout(() => button.textContent = original, 1400);
    }

    function mountPreview(item) {
      const el = document.getElementById('viewport');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x101827);
      const camera = new THREE.PerspectiveCamera(38, 1, .1, 60);
      camera.position.set(3.3, 2.4, 5.0);
      camera.lookAt(0, 1, 0);
      scene.add(new THREE.HemisphereLight(0x9cc9ff, 0x2e2417, 1.7));
      const key = new THREE.DirectionalLight(0xffffff, 2.2);
      key.position.set(4, 6, 4);
      scene.add(key);
      const asset = createAssetById(item.id);
      scene.add(asset);
      const ground = new THREE.Mesh(new THREE.CylinderGeometry(1.55, 1.75, .08, 10), new THREE.MeshStandardMaterial({ color: 0x233047, roughness: 1, flatShading: true }));
      ground.receiveShadow = true;
      scene.add(ground);
      const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      el.appendChild(renderer.domElement);
      const clock = new THREE.Clock();
      const resize = () => {
        const w = Math.max(1, el.clientWidth);
        const h = Math.max(1, el.clientHeight);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h, false);
      };
      addEventListener('resize', resize);
      resize();
      function tick() {
        const t = clock.getElapsedTime();
        const delta = clock.getDelta();
        asset.rotation.y += delta * .35;
        animateAsset(asset, window.selectedAnimation || 'idle', t, delta);
        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      }
      tick();
    }
  </script>
</body>
</html>
