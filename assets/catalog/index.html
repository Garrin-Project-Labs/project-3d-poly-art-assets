<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Poly Art Assets — Catalog</title>
  <style>
    :root { color-scheme: dark; --bg:#101827; --panel:#172235; --text:#e5edf7; --muted:#a9b7cc; --gold:#f8cf5a; --blue:#9cc9ff; }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; background:radial-gradient(circle at top left,#24395d,var(--bg) 48%); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,sans-serif; }
    body { padding:28px; }
    header { max-width:1120px; margin:0 auto 22px; }
    a { color:var(--blue); }
    h1 { margin:8px 0 8px; font-size:clamp(34px,6vw,64px); letter-spacing:-.05em; line-height:.95; }
    p { color:var(--muted); font-size:17px; line-height:1.5; max-width:76ch; }
    .toolbar { max-width:1120px; margin:0 auto 18px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .toolbar a, .toolbar button, select { border:1px solid rgba(255,255,255,.12); border-radius:999px; padding:9px 12px; background:rgba(255,255,255,.07); color:var(--text); text-decoration:none; font-weight:800; cursor:pointer; }
    .toolbar button.active { background:var(--gold); color:#101827; }
    select { background:#172235; }
    .grid { max-width:1120px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; }
    .card { min-height:360px; border:1px solid rgba(255,255,255,.1); border-radius:24px; background:rgba(23,34,53,.84); overflow:hidden; box-shadow:0 22px 70px rgba(0,0,0,.28); }
    .viewport { height:250px; background:linear-gradient(#18243a,#101827); position:relative; display:grid; place-items:center; }
    .viewport::before { content:'Loading preview…'; color:rgba(229,237,247,.48); font-size:12px; font-weight:800; letter-spacing:.04em; }
    .viewport canvas { position:absolute; inset:0; width:100%; height:100%; }
    .copy { padding:16px; }
    .eyebrow { color:var(--gold); font-weight:850; font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
    .name { margin-top:5px; font-size:22px; font-weight:900; }
    .meta { margin-top:7px; color:var(--muted); font-size:13px; line-height:1.35; }
    .tags { margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; }
    .tag { padding:4px 7px; border-radius:999px; background:rgba(156,201,255,.12); color:#cfe4ff; font-size:11px; font-weight:750; }
  </style>
</head>
<body>
  <header>
    <a href="../../index.html">← Back to live preview</a>
    <h1>Asset Catalog</h1>
    <p>Standalone procedural low-poly asset definitions. These are reusable browser assets for future scenes and gameplay prototypes. Import the library, call <code>createAssetById(id)</code>, and optionally drive it with <code>animateAsset()</code>.</p>
  </header>
  <nav class="toolbar" aria-label="Catalog filters">
    <a href="../README.md">Usage README</a>
    <a href="../../docs/asset-roadmap.md">Roadmap</a>
    <button class="active" data-filter="all">All</button>
    <button data-filter="hero">Heroes</button>
    <button data-filter="monster">Monsters</button>
    <button data-filter="npc">NPCs</button>
    <button data-filter="environment">Environment</button>
    <label>Animation <select id="animationSelect"><option value="auto">Auto</option><option>idle</option><option>walk</option><option>jump</option><option>hop</option><option>attack</option><option>cast</option><option>fly</option><option>wave</option><option>work</option><option>flame</option></select></label>
  </nav>
  <main class="grid" id="catalog"></main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { ASSET_CATALOG, createAssetById, animateAsset } from '../library/low_poly_asset_library.js';

    const catalog = document.getElementById('catalog');
    const animationSelect = document.getElementById('animationSelect');
    let selectedAnimation = 'auto';

    const previews = [];
    const previewByElement = new Map();
    const previewObserver = new IntersectionObserver(entries => {
      for (const entry of entries) {
        const preview = previewByElement.get(entry.target);
        if (!preview) continue;
        const card = entry.target.closest('.card');
        if (entry.isIntersecting && !card.hidden) preview.start();
        else preview.stop();
      }
    }, { rootMargin: '240px 0px' });

    for (const item of ASSET_CATALOG) {
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.type = item.type;
      card.innerHTML = `
        <div class="viewport" id="view-${item.id}"></div>
        <div class="copy">
          <div class="eyebrow">${item.type} · ${item.role}</div>
          <div class="name">${item.name}</div>
          <div class="meta">Asset id: <code>${item.id}</code><br>Animations: ${item.animations.join(', ')}<br><a href="../snippets/${item.id}.js" download>Download JS snippet</a></div>
          <div class="tags">${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
        </div>`;
      catalog.appendChild(card);
      const viewport = card.querySelector('.viewport');
      const preview = mountPreview(viewport, item);
      previews.push(preview);
      previewByElement.set(viewport, preview);
      previewObserver.observe(viewport);
    }

    animationSelect.onchange = () => selectedAnimation = animationSelect.value;

    document.querySelectorAll('[data-filter]').forEach(button => {
      button.onclick = () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        button.classList.add('active');
        const filter = button.dataset.filter;
        document.querySelectorAll('.card').forEach(card => {
          const hidden = filter !== 'all' && card.dataset.type !== filter;
          card.hidden = hidden;
          const preview = previewByElement.get(card.querySelector('.viewport'));
          if (hidden) preview.stop();
          else preview.startIfVisible();
        });
      };
    });

    function mountPreview(el, item) {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x101827);
      const camera = new THREE.PerspectiveCamera(40, 1, .1, 50);
      camera.position.set(2.8, 2.0, 4.4);
      camera.lookAt(0, 1, 0);

      scene.add(new THREE.HemisphereLight(0x9cc9ff, 0x2e2417, 1.7));
      const key = new THREE.DirectionalLight(0xffffff, 2.2);
      key.position.set(4, 6, 4);
      key.castShadow = true;
      scene.add(key);

      const asset = createAssetById(item.id);
      asset.position.y = .02;
      scene.add(asset);

      const ground = new THREE.Mesh(
        new THREE.CylinderGeometry(1.25, 1.45, .08, 9),
        new THREE.MeshStandardMaterial({ color: 0x233047, roughness: 1, flatShading: true })
      );
      ground.receiveShadow = true;
      scene.add(ground);

      const clock = new THREE.Clock();
      let renderer = null;
      let frameId = 0;

      const resize = () => {
        if (!renderer) return;
        const w = Math.max(1, el.clientWidth);
        const h = Math.max(1, el.clientHeight);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h, false);
      };

      const start = () => {
        if (renderer) return;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        el.appendChild(renderer.domElement);
        addEventListener('resize', resize);
        resize();
        clock.start();
        animate();
      };

      const stop = () => {
        if (!renderer) return;
        cancelAnimationFrame(frameId);
        removeEventListener('resize', resize);
        renderer.dispose();
        renderer.forceContextLoss();
        renderer.domElement.remove();
        renderer = null;
      };

      const startIfVisible = () => {
        const rect = el.getBoundingClientRect();
        const visible = rect.bottom >= -240 && rect.top <= innerHeight + 240 && rect.width > 0 && rect.height > 0;
        if (visible) start();
      };

      function animate() {
        if (!renderer) return;
        const t = clock.getElapsedTime();
        const delta = clock.getDelta();
        const autoAnimation = item.animations.includes('walk') ? 'walk' : item.animations.includes('fly') ? 'fly' : item.animations.includes('flame') ? 'flame' : item.animations.includes('hop') ? 'hop' : 'idle';
        const animation = selectedAnimation === 'auto' ? autoAnimation : selectedAnimation;
        asset.rotation.y += delta * .35;
        animateAsset(asset, animation, t, delta);
        renderer.render(scene, camera);
        frameId = requestAnimationFrame(animate);
      }

      return { el, start, stop, startIfVisible };
    }
  </script>
</body>
</html>
